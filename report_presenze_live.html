<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Report Presenze</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--card:#21253a;--border:rgba(255,255,255,0.07);--text:#eef0f8;--muted:#8b90a8;--green:#3ecf8e;--orange:#f5a623;--red:#f26464}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);padding-bottom:3rem}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:1rem 0}
.kpi{background:var(--card);border-radius:12px;padding:11px 10px;border:1px solid var(--border)}
.kpi-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi-val{font-family:"DM Mono",monospace;font-size:1.4rem;font-weight:500;line-height:1}
.kpi-sub{font-size:.65rem;color:var(--muted);margin-top:3px}
.section{margin:1.25rem 0 .5rem;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px}
.accordion{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.ah{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer}
.at{font-size:.8rem;font-weight:600;color:var(--text)}
.am{font-size:.72rem;color:var(--muted);margin-left:8px}
.ai{font-size:1rem;color:var(--muted);transition:transform .25s}
.accordion.open .ai{transform:rotate(180deg)}
.ab{display:none;padding:0 14px 14px}
.accordion.open .ab{display:block}
.ath-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.ar{font-family:"DM Mono",monospace;font-size:.65rem;color:var(--muted);width:18px;text-align:right;flex-shrink:0}
.an{font-size:.73rem;width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.an.top{font-weight:600}
.at2{flex:1;height:7px;background:var(--surface);border-radius:99px;overflow:hidden}
.af{height:100%;border-radius:99px}
.anum{font-family:"DM Mono",monospace;font-size:.7rem;color:var(--muted);width:28px;text-align:right;flex-shrink:0}
.apct{font-family:"DM Mono",monospace;font-size:.65rem;width:34px;text-align:right;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:8px 0}
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mini-card{background:var(--surface);border-radius:10px;padding:10px 12px;border:1px solid var(--border);position:relative}
.mini-card.best{border-color:rgba(255,255,255,.2)}
.mini-name{font-size:.75rem;font-weight:500;margin-bottom:6px}
.mini-stats{display:flex;flex-direction:column;gap:3px}
.mini-stat{display:flex;justify-content:space-between;font-size:.7rem}
.mini-stat span:first-child{color:var(--muted)}
.mini-stat span:last-child{font-family:"DM Mono",monospace;font-weight:500}
.mini-bar{height:3px;border-radius:99px;margin-top:8px;background:var(--border)}
.mini-bar-fill{height:100%;border-radius:99px}
.best-badge{position:absolute;top:8px;right:8px;font-size:.6rem;font-weight:600;text-transform:uppercase;padding:2px 6px;border-radius:99px}
.mch{position:relative;width:100%;height:180px}
.ch{display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);margin-bottom:8px;padding:0 0 4px;border-bottom:1px solid var(--border)}
.eb{background:#2a1a1a;border:1px solid var(--red);border-radius:12px;padding:14px;margin:1rem 0;font-size:.8rem;color:var(--red)}
.en{color:var(--muted);font-size:.8rem;text-align:center;padding:1.5rem}
.pod-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;align-items:flex-end;margin-top:4px}
.pod-col{display:flex;flex-direction:column;align-items:stretch}
#splash{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.5rem;min-height:100vh;gap:1.25rem}
#main{display:none}
.mh{padding:1rem 1.25rem .75rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.panel{display:none;padding:0 1.25rem}
.panel.active{display:block}
select{font-family:"DM Sans",sans-serif}
</style>
</head>

  {id:"p3",name:"Meneghin",             label:"Meneghin",            color:"#f5a623",dateCol:"Colonna 2", presCol:"Presenza all - gare",actCol:"Attività"},
  {id:"p4",name:"SALTI",                label:"Salti",               color:"#f472b6",dateCol:"Data",      presCol:"Presenza",           actCol:"Attività"}
];
const DL = {};

function pD(v){
  if(!v||!v.trim())return null;
  const m=v.match(/[A-Z][a-z]{2}\s+([A-Z][a-z]{2})\s+(\d{1,2})\s+(\d{4})/);
  if(m){const mo={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};return new Date(+m[3],mo[m[1]],+m[2]);}
  const d=new Date(v);return isNaN(d)?null:d;
}
function sC(l){let r=[],c="",q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){q=!q;}else if(ch===","&&!q){r.push(c);c="";}else c+=ch;}r.push(c);return r;}
function pC(t){const ls=t.split("\n");const hs=sC(ls[0]);return ls.slice(1).filter(l=>l.trim()).map(l=>{const vs=sC(l);const o={};hs.forEach((h,i)=>o[h.trim()]=(vs[i]||"").trim());return o;});}

function pR(rows,cfg){
  const sk=/giorni|n°|maggior|costo/i;
  const ak=Object.keys(rows[0]||{});
  const fC=n=>ak.find(k=>k.trim().toLowerCase()===n.trim().toLowerCase())||n;
  const aC=fC(cfg.actCol),dC=fC(cfg.dateCol),pC2=fC(cfg.presCol);
  const athC=ak.filter(k=>k.includes("[")&&k.includes("]"));
  const data=rows.filter(r=>{const a=(r[aC]||"").trim();return a&&!sk.test(a);});
  data.forEach(r=>{r._d=pD(r[dC]);r._a=/allenamento/i.test(r[aC]||"");r._p=parseInt(r[pC2])||0;});
  const alls=data.filter(r=>r._a&&r._d);
  const gare=data.filter(r=>!r._a&&r._d);
  const am={},ag={};
  athC.forEach(col=>{const nm=col.trim().replace(/^\[|\]$/g,"").trim();am[nm]=alls.filter(r=>(r[col]||"").trim()==="X").length;ag[nm]=gare.filter(r=>(r[col]||"").trim()==="X").length;});
  const ath=Object.entries(am).sort((a,b)=>b[1]-a[1]);
  const athG=Object.entries(ag).sort((a,b)=>b[1]-a[1]);
  const pr=alls.map(r=>r._p).filter(x=>x>0);
  const med=pr.length?pr.reduce((a,b)=>a+b,0)/pr.length:0;
  const a80=ath.filter(a=>alls.length>0&&a[1]/alls.length>=0.8).length;
  const mM={};
  alls.forEach(r=>{const m=r._d.getMonth()+1;if(!mM[m])mM[m]={s:0,sum:0,sg:0,sumg:0};mM[m].s++;mM[m].sum+=r._p;});
  gare.forEach(r=>{const m=r._d.getMonth()+1;if(!mM[m])mM[m]={s:0,sum:0,sg:0,sumg:0};mM[m].sg=(mM[m].sg||0)+1;mM[m].sumg=(mM[m].sumg||0)+r._p;});
  const months={};
  Object.entries(mM).sort((a,b)=>+a[0]-+b[0]).forEach(([m,v])=>{months[m]={s:v.s,m:v.s>0?v.sum/v.s:0,sg:v.sg||0,mg:v.sg>0?v.sumg/v.sg:0};});
  return{nA:alls.length,nG:gare.length,nAt:athC.length,med:med,a80:a80,mn:pr.length?Math.min(...pr):0,mx:pr.length?Math.max(...pr):0,ar:alls.length&&ath.length?Math.round(ath.reduce((s,a)=>s+a[1]/alls.length,0)/ath.length*1000)/10:0,ath:ath,athG:athG,mo:months};
}

function rC(v){return v>=80?"var(--green)":v>=60?"var(--orange)":"var(--red)";}

function aLH(list,color,tot,topN){
  if(!list.length)return'<p class="en">Nessun dato</p>';
  const mx=list[0][1]||1;
  return'<div class="ch"><span style="width:18px"></span><span style="flex:0 0 130px">Atleta</span><span style="flex:1"></span><span style="width:28px;text-align:right">Pres.</span><span style="width:34px;text-align:right">%</span></div>'+
  list.map(([name,val],i)=>{
    const iT=i<topN&&val>0,p=Math.round(val/mx*100),rP=tot>0?Math.round(val/tot*100):0;
    const sep=i===topN-1&&list.length>topN?'<div class="divider"></div>':""
    return `${sep}<div class="ath-row"><div class="ar">${i+1}</div><div class="an${iT?" top":""}" style="color:${iT?color:"var(--muted)"}" title="${name}">${name}</div><div class="at2"><div class="af" style="width:${p}%;background:${iT?color:color+"55"};height:100%;border-radius:99px"></div></div><div class="anum">${val}</div><div class="apct" style="color:${iT?color:"var(--muted)"}">${rP}%</div></div>`;
  }).join("");
}

function podiumHTML(ath,athG,color,nA,nG){
  function medal(i){return i===0?"🥇":i===1?"🥈":"🥉";}
  function sL(list,col){
    const t3=list.filter(([,v])=>v>0).slice(0,3);
    if(!t3.length)return'<p class="en">Nessun dato</p>';
    return t3.map(([name,val],i)=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;${i<t3.length-1?"border-bottom:1px solid var(--border)":""}"><span style="font-size:1.1rem;width:24px;flex-shrink:0">${medal(i)}</span><span style="flex:1;font-size:.8rem;font-weight:500;color:var(--text)">${name}</span><span style="font-family:'DM Mono',monospace;font-size:.8rem;font-weight:600;color:${col}">${val}</span></div>`).join("");
  }
  return `<div class="card"><div style="font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Allenamenti</div>${sL(ath,color)}<div style="height:1px;background:var(--border);margin:12px 0"></div><div style="font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Gare</div>${nG>0?sL(athG,"#f26464"):'<p class="en">Nessuna gara</p>'}</div>`;
}

function acc(t,m,c,o){const id="ac"+Math.random().toString(36).slice(2);return `<div class="accordion${o?" open":""}" id="${id}"><div class="ah" onclick="tA('${id}')"><div><span class="at">${t}</span><span class="am">${m}</span></div><span class="ai">&#9662;</span></div><div class="ab">${c}</div></div>`;}
function tA(id){document.getElementById(id).classList.toggle("open");}

function rG(cfg,st){
  const el=document.getElementById(cfg.id);
  const mK=Object.keys(st.mo).sort((a,b)=>+a-+b);
  const mL=mK.map(k=>MESI[k-1]);
  const mD=mK.map(k=>+st.mo[k].m.toFixed(1));
  const mGD=mK.map(k=>+(st.mo[k].mg||0).toFixed(1));
  const rc=rC(st.ar);
  el.innerHTML=`
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Allenamenti</div><div class="kpi-val" style="color:${cfg.color}">${st.nA}</div><div class="kpi-sub">sessioni</div></div>
      <div class="kpi"><div class="kpi-label">Gare</div><div class="kpi-val" style="color:var(--red)">${st.nG}</div><div class="kpi-sub">competizioni</div></div>
      <div class="kpi"><div class="kpi-label">Atleti</div><div class="kpi-val">${st.nAt}</div><div class="kpi-sub">nel gruppo</div></div>
      <div class="kpi"><div class="kpi-label">Media/sessione</div><div class="kpi-val" style="color:${cfg.color}">${st.med.toFixed(1)}</div><div class="kpi-sub">presenti</div></div>
    </div>
    <div class="section">&#128197; Presenze per mese</div>
    <div class="card"><div class="mch"><canvas id="mc-${cfg.id}"></canvas></div></div>
    <div class="section">&#127942; Podio</div>
    ${acc("Top 3 presenze","allenamenti & gare",podiumHTML(st.ath,st.athG,cfg.color,st.nA,st.nG),false)}
    <div class="section">&#11088; Presenze allenamenti</div>
    ${acc("Tutti gli atleti",`${st.nAt} atleti · ${st.nA} sessioni`,aLH(st.ath,cfg.color,st.nA,5),false)}
    <div class="section">&#127941; Partecipazione gare</div>
    ${acc("Tutti gli atleti – gare",`${st.nAt} atleti · ${st.nG} gare`,st.nG>0?aLH(st.athG,"#f26464",st.nG,3):'<p class="en">Nessuna gara registrata</p>',false)}
  `;
  new Chart(document.getElementById(`mc-${cfg.id}`),{
    type:"bar",
    data:{labels:mL,datasets:[
      {label:"Allenamenti",data:mD,backgroundColor:cfg.color+"99",borderColor:cfg.color,borderWidth:1.5,borderRadius:0,stack:"s"},
      {label:"Gare",data:mGD,backgroundColor:"#f2646499",borderColor:"#f26464",borderWidth:1.5,borderRadius:4,stack:"s"}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:"#8b90a8",font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y.toFixed(1)}`}}},scales:{x:{ticks:{color:"#8b90a8",font:{size:11}},grid:{color:"rgba(255,255,255,0.05)"},stacked:true},y:{ticks:{color:"#8b90a8",font:{size:11}},grid:{color:"rgba(255,255,255,0.05)"},beginAtZero:true,stacked:true}}}
  });
}

function sG(pid){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.getElementById(pid).classList.add("active");
  const cfg=GC.find(g=>g.id===pid);
  const sel=document.getElementById("gs");
  if(sel&&cfg)sel.style.borderColor=cfg.color;
}

async function fetchCSV(sheetName){
  const url=SU+"?sheet="+encodeURIComponent(sheetName);
  const r=await fetch(url);
  const json=await r.json();
  if(json.error)throw new Error(json.error);
  return json.data;
}

async function lG(cfg){
  if(DL[cfg.id])return;
  const el=document.getElementById(cfg.id);
  el.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;padding:2rem;gap:12px;color:var(--muted)"><div class="spinner"></div>Caricamento...</div>';
  try{
    const csv=await fetchCSV(cfg.name);
    const rows=pC(csv);
    const st=pR(rows,cfg);
    rG(cfg,st);
    DL[cfg.id]=true;
  }catch(err){
    el.innerHTML=`<div class="eb">&#9888;&#65039; Errore: ${err.message}</div>`;
  }
}

async function startReport(pid){
  if(!pid)return;
  document.getElementById("sl").style.display="flex";
  document.querySelectorAll("#splash button").forEach(b=>b.disabled=true);
  document.getElementById("splash").style.display="none";
  document.getElementById("main").style.display="block";
  document.getElementById("gs").value=pid;
  sG(pid);
  await Promise.all(GC.map(cfg=>lG(cfg)));
  const now=new Date();
  document.getElementById("lu").textContent="\u2705 Aggiornato: "+now.toLocaleString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  document.getElementById("gs").addEventListener("change",async function(){
    const p=this.value;sG(p);const c=GC.find(g=>g.id===p);await lG(c);
  });
}
</script>
</body>
</html>
